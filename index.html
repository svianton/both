<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Дыхание</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #eae6fb;
    --surface: #ffffff;
    --ink: #17151f;
    --muted: #8b8698;
    --hero1: #b3a0f2;
    --hero2: #8e74e8;
    --accent: #7a5cf0;
    /* цвета техник */
    --c-box: #d8ccff;   --c-box-ink: #4a2fb0;
    --c-478: #c4e0ff;   --c-478-ink: #1f5fa8;
    --c-coh: #c4efd6;   --c-coh-ink: #1f8a55;
    --c-relax: #ffdcb8; --c-relax-ink: #b3641a;
    /* тема практики (по умолчанию — фиолетовая, меняется под технику) */
    --orb-hi: #b6a2ff; --orb-mid: #8e74e8; --orb-deep: #6b4fd6;
    --orb-glow: rgba(122,92,240,.6);
    --ring: #7a5cf0; --ring-sub: #b9a6f6; --ring-track: rgba(122,92,240,.14);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior: none;
    user-select: none;
    -webkit-font-smoothing: antialiased;
  }
  #app { min-height: 100%; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }

  .screen { flex: 1; display: none; flex-direction: column; padding: 18px 18px 26px; }
  .screen.active { display: flex; }

  /* ---------- Шапка ---------- */
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .greet .hi { font-size: 14px; color: var(--muted); font-weight: 600; }
  .greet .name { font-size: 22px; font-weight: 800; letter-spacing: -.3px; }
  .avatar {
    width: 46px; height: 46px; border-radius: 50%;
    background: linear-gradient(135deg, var(--hero1), var(--hero2));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; box-shadow: 0 6px 16px rgba(122,92,240,.35);
  }

  /* ---------- Hero ---------- */
  .hero {
    position: relative; overflow: hidden;
    border-radius: 30px; padding: 24px 22px;
    background: linear-gradient(135deg, var(--hero1) 0%, var(--hero2) 100%);
    color: #fff; margin-bottom: 22px;
    box-shadow: 0 18px 38px -12px rgba(122,92,240,.55);
  }
  .hero h1 { font-size: 30px; line-height: 1.05; font-weight: 800; margin: 0 0 8px; letter-spacing: -.5px; }
  .hero p { margin: 0; font-size: 14px; font-weight: 500; opacity: .92; max-width: 70%; }
  .hero .blob {
    position: absolute; right: -30px; top: -20px; width: 190px; height: 190px;
    opacity: .95; pointer-events: none;
  }
  .hero .cta {
    display: inline-flex; align-items: center; gap: 8px; margin-top: 16px;
    background: rgba(255,255,255,.22); backdrop-filter: blur(4px);
    border-radius: 100px; padding: 8px 16px; font-size: 13px; font-weight: 700;
  }

  /* ---------- Streak-лог ---------- */
  .streak-head { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
  .streak-count { font-size: 46px; font-weight: 800; line-height: 1; letter-spacing: -1px; }
  .streak-label { flex: 1; }
  .streak-title { font-size: 16px; font-weight: 800; }
  .streak-sub { font-size: 13px; font-weight: 500; opacity: .9; margin-top: 2px; }
  .flame {
    width: 46px; height: 46px; border-radius: 50%;
    background: rgba(255,255,255,.18);
    display: flex; align-items: center; justify-content: center;
  }
  .week { display: flex; justify-content: space-between; gap: 6px; }
  .day { flex: 1; text-align: center; }
  .day .dow { font-size: 11px; font-weight: 700; opacity: .8; margin-bottom: 7px; }
  .day .cell {
    width: 30px; height: 30px; border-radius: 50%; margin: 0 auto;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    background: rgba(255,255,255,.16); color: rgba(255,255,255,.85);
  }
  .day .cell.done { background: #fff; color: var(--hero2); }
  .day .cell.today { box-shadow: 0 0 0 2px rgba(255,255,255,.95); }

  /* ---------- Заголовки секций ---------- */
  .section-title { font-size: 18px; font-weight: 800; margin: 4px 2px 12px; letter-spacing: -.3px; }

  /* ---------- Пилюли длительности ---------- */
  .durations { display: flex; gap: 10px; margin-bottom: 24px; }
  .dur-pill {
    flex: 1; text-align: center; cursor: pointer;
    background: var(--surface); color: var(--muted);
    border-radius: 18px; padding: 14px 0; font-size: 15px; font-weight: 700;
    border: 2px solid transparent; transition: transform .1s, background .2s, color .2s;
    box-shadow: 0 4px 14px rgba(90,70,150,.06);
  }
  .dur-pill:active { transform: scale(.96); }
  .dur-pill .u { display: block; font-size: 11px; font-weight: 600; opacity: .7; margin-top: 2px; }
  .dur-pill.selected { background: var(--ink); color: #fff; }

  /* ---------- Карточки техник ---------- */
  .techniques { display: flex; flex-direction: column; gap: 14px; }
  .tech-card {
    position: relative; overflow: hidden;
    border-radius: 26px; padding: 20px 20px 18px; cursor: pointer;
    transition: transform .12s ease;
    box-shadow: 0 10px 26px -14px rgba(40,20,90,.4);
  }
  .tech-card:active { transform: scale(.98); }
  .tech-card .pill {
    display: inline-block; background: rgba(255,255,255,.55);
    border-radius: 100px; padding: 5px 12px; font-size: 12px; font-weight: 700; margin-bottom: 12px;
  }
  .tech-card .name { font-size: 22px; font-weight: 800; letter-spacing: -.4px; margin-bottom: 4px; }
  .tech-card .desc { font-size: 13px; font-weight: 500; line-height: 1.45; opacity: .82; max-width: 82%; }
  .tech-card .play {
    position: absolute; right: 18px; bottom: 18px;
    width: 46px; height: 46px; border-radius: 50%;
    background: var(--ink); color: #fff;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
    box-shadow: 0 8px 18px rgba(0,0,0,.22);
  }
  .tc-box   { background: var(--c-box);   color: var(--c-box-ink); }
  .tc-478   { background: var(--c-478);   color: var(--c-478-ink); }
  .tc-coh   { background: var(--c-coh);   color: var(--c-coh-ink); }
  .tc-relax { background: var(--c-relax); color: var(--c-relax-ink); }

  .footer-note { text-align: center; color: var(--muted); font-size: 12px; font-weight: 600; margin-top: 22px; }

  /* ---------- Экран практики ---------- */
  #practice {
    justify-content: space-between; align-items: center; position: relative;
    background: radial-gradient(120% 80% at 50% 0%, #efe9ff 0%, var(--bg) 60%);
  }
  .practice-header { width: 100%; text-align: center; margin-top: 6px; }
  .practice-header .tname { font-size: 22px; font-weight: 800; letter-spacing: -.3px; }
  .practice-header .tpattern { color: var(--muted); font-size: 13px; font-weight: 600; margin-top: 3px; }

  .sound-toggle {
    position: absolute; top: 30px; right: 18px;
    width: 46px; height: 46px; border-radius: 50%;
    background: var(--surface); border: none;
    color: var(--ring); font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 16px rgba(90,70,150,.14); transition: transform .1s;
  }
  .sound-toggle:active { transform: scale(.9); }
  .sound-toggle.off { color: var(--muted); }

  .breath-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
  .circle-outer {
    position: relative; width: 300px; height: 300px;
    display: flex; align-items: center; justify-content: center;
  }
  .progress { position: absolute; width: 300px; height: 300px; transform: rotate(-90deg); }
  .progress .track { fill: none; stroke: var(--ring-track); stroke-width: 5; }
  .progress .prog { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke .5s ease; }
  .prog-time { stroke: var(--ring); }
  .prog-cycle { stroke: var(--ring-sub); }
  .circle {
    position: absolute; width: 190px; height: 190px; border-radius: 50%;
    background: radial-gradient(circle at 34% 28%, var(--orb-hi) 0%, var(--orb-mid) 55%, var(--orb-deep) 100%);
    box-shadow: 0 24px 60px -8px var(--orb-glow), inset 0 4px 20px rgba(255,255,255,.35);
    transform: scale(.6);
    transition: transform .6s ease-in-out, background .5s ease, box-shadow .5s ease;
  }
  /* число-обратный отсчёт — в центре круга */
  .phase-count {
    position: relative; z-index: 2; color: #fff;
    font-size: 52px; font-weight: 700; line-height: 1;
    text-shadow: 0 2px 10px rgba(60,30,140,.4);
  }
  /* название фазы — под кругом, не вылезает при сжатии */
  .phase-name {
    margin-top: 18px; text-align: center;
    font-size: 22px; font-weight: 800; letter-spacing: -.3px;
    color: var(--ink);
  }

  .legend {
    display: flex; gap: 22px; margin-top: 18px;
    font-size: 13px; font-weight: 600; color: var(--muted);
  }
  .legend span { display: inline-flex; align-items: center; gap: 7px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .dot-time { background: #7a5cf0; }
  .dot-cycle { background: #b9a6f6; }

  .controls { width: 100%; display: flex; gap: 12px; padding-top: 22px; }
  .btn {
    flex: 1; border: none; border-radius: 20px; padding: 17px;
    font-family: inherit; font-size: 16px; font-weight: 800; cursor: pointer; transition: transform .1s;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--ink); color: #fff; box-shadow: 0 10px 24px rgba(0,0,0,.2); }
  .btn-secondary { background: var(--surface); color: var(--ink); box-shadow: 0 6px 16px rgba(90,70,150,.08); }
</style>
</head>
<body>
<div id="app">

  <!-- Выбор техники -->
  <section id="menu" class="screen active">
    <div class="topbar">
      <div class="greet">
        <div class="hi" id="greetHi">Дыши спокойно</div>
        <div class="name" id="greetName">Практики</div>
      </div>
      <div class="avatar" id="avatar">🫧</div>
    </div>

    <div class="hero streak">
      <div class="streak-head">
        <div class="streak-count" id="streakNum">0</div>
        <div class="streak-label">
          <div class="streak-title">дней подряд</div>
          <div class="streak-sub" id="streakSub">Начни сегодня</div>
        </div>
        <div class="flame">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="rgba(255,255,255,.95)">
            <path d="M12 2s5 3.6 5 8.6a5 5 0 0 1-10 0c0-1.8.8-3.2 1.8-4.2C8.9 8.2 9.7 9 10.7 9 10.7 6.4 9.8 4.3 12 2z"/>
          </svg>
        </div>
      </div>
      <div class="week" id="weekRow"></div>
    </div>

    <div class="section-title">Длительность</div>
    <div class="durations" id="durRow"></div>

    <div class="section-title">Техники</div>
    <div class="techniques" id="techList"></div>

    <p class="footer-note">Сядь удобно · дыши носом · следуй за кругом</p>
  </section>

  <!-- Практика -->
  <section id="practice" class="screen">
    <button class="sound-toggle" id="soundBtn" aria-label="Звук"></button>
    <div class="practice-header">
      <div class="tname" id="pName"></div>
      <div class="tpattern" id="pPattern"></div>
    </div>

    <div class="breath-wrap">
      <div class="circle-outer">
        <svg class="progress" viewBox="0 0 300 300" aria-hidden="true">
          <circle class="track" cx="150" cy="150" r="141"></circle>
          <circle class="prog prog-time" id="ringTime" cx="150" cy="150" r="141"></circle>
          <circle class="track" cx="150" cy="150" r="116"></circle>
          <circle class="prog prog-cycle" id="ringCycle" cx="150" cy="150" r="116"></circle>
        </svg>
        <div class="circle" id="circle"></div>
        <div class="phase-count" id="phaseCount"></div>
      </div>
      <div class="phase-name" id="phaseName">Готов?</div>
      <div class="legend">
        <span><i class="dot dot-time"></i>Время</span>
        <span><i class="dot dot-cycle"></i>Цикл</span>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-secondary" id="stopBtn">Назад</button>
      <button class="btn btn-primary" id="toggleBtn">Старт</button>
    </div>
  </section>

</div>

<script>
(function () {
  "use strict";

  // ---- Telegram integration (безопасно работает и вне Telegram) ----
  var tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
  if (tg) {
    tg.ready();
    tg.expand();
  }
  function haptic(type) {
    try {
      if (tg && tg.HapticFeedback) {
        if (type === 'change') tg.HapticFeedback.selectionChanged();
        else tg.HapticFeedback.impactOccurred(type || 'light');
      }
    } catch (e) {}
  }

  // ---- Аудио-движок (Web Audio, без файлов) ----
  // Каждая техника получает свою сцену: box — гармонический пад,
  // 478 — море, coherent — лес (ветер + птицы), relax — дождь.
  var Audio = {
    ctx: null, master: null, on: true, sceneId: null, nodes: [], birdTimer: null, _nb: null,
    ensureCtx: function () {
      if (this.ctx) return;
      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) { this.on = false; return; }
      this.ctx = new AC();
      this.master = this.ctx.createGain();
      this.master.gain.value = 0.0;
      this.master.connect(this.ctx.destination);
    },
    // розовый шум в буфере (переиспользуется)
    noiseBuffer: function () {
      if (this._nb) return this._nb;
      var c = this.ctx, len = c.sampleRate * 2, b = c.createBuffer(1, len, c.sampleRate), d = b.getChannelData(0);
      var b0 = 0, b1 = 0, b2 = 0;
      for (var i = 0; i < len; i++) {
        var w = Math.random() * 2 - 1;
        b0 = 0.99765 * b0 + w * 0.0990460;
        b1 = 0.96300 * b1 + w * 0.2965164;
        b2 = 0.57000 * b2 + w * 1.0526913;
        d[i] = (b0 + b1 + b2 + w * 0.1848) * 0.16;
      }
      this._nb = b; return b;
    },
    _noise: function () {
      var s = this.ctx.createBufferSource();
      s.buffer = this.noiseBuffer(); s.loop = true; return s;
    },
    clearScene: function () {
      if (this.birdTimer) { clearTimeout(this.birdTimer); this.birdTimer = null; }
      this.nodes.forEach(function (n) {
        try { if (n.stop) n.stop(); } catch (e) {}
        try { n.disconnect(); } catch (e) {}
      });
      this.nodes = [];
    },
    buildScene: function (id) {
      this.clearScene();
      var c = this.ctx, out = this.master, now = c.currentTime, N = this.nodes;

      if (id === '478') { // море: прибой
        var src = this._noise();
        var lp = c.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 520; lp.Q.value = 0.3;
        var g = c.createGain(); g.gain.value = 0.34;
        src.connect(lp); lp.connect(g); g.connect(out);
        var lfo = c.createOscillator(); lfo.frequency.value = 0.09;
        var lg = c.createGain(); lg.gain.value = 0.28;
        lfo.connect(lg); lg.connect(g.gain);
        var flfo = c.createOscillator(); flfo.frequency.value = 0.09;
        var fg = c.createGain(); fg.gain.value = 180;
        flfo.connect(fg); fg.connect(lp.frequency);
        src.start(now); lfo.start(now); flfo.start(now);
        N.push(src, lp, g, lfo, lg, flfo, fg);

      } else if (id === 'coherent') { // лес: ветер + птицы
        var wsrc = this._noise();
        var bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 720; bp.Q.value = 0.5;
        var wg = c.createGain(); wg.gain.value = 0.16;
        wsrc.connect(bp); bp.connect(wg); wg.connect(out);
        var wlfo = c.createOscillator(); wlfo.frequency.value = 0.06;
        var wlg = c.createGain(); wlg.gain.value = 0.10;
        wlfo.connect(wlg); wlg.connect(wg.gain);
        wsrc.start(now); wlfo.start(now);
        N.push(wsrc, bp, wg, wlfo, wlg);
        var self = this;
        function chirp() {
          if (self.sceneId !== 'coherent' || !self.on) { self.birdTimer = setTimeout(chirp, 3000); return; }
          var t = c.currentTime;
          var o = c.createOscillator(); o.type = 'sine';
          var og = c.createGain(); og.gain.value = 0;
          o.connect(og); og.connect(out);
          var f0 = 1800 + Math.random() * 1300;
          o.frequency.setValueAtTime(f0, t);
          o.frequency.exponentialRampToValueAtTime(f0 * 1.5, t + 0.07);
          o.frequency.exponentialRampToValueAtTime(f0 * 0.85, t + 0.16);
          og.gain.setValueAtTime(0, t);
          og.gain.linearRampToValueAtTime(0.045, t + 0.02);
          og.gain.exponentialRampToValueAtTime(0.0004, t + 0.22);
          o.start(t); o.stop(t + 0.26);
          self.birdTimer = setTimeout(chirp, 2400 + Math.random() * 4200);
        }
        this.birdTimer = setTimeout(chirp, 1600 + Math.random() * 1800);

      } else if (id === 'relax') { // дождь
        var rsrc = this._noise();
        var hp = c.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 900;
        var rlp = c.createBiquadFilter(); rlp.type = 'lowpass'; rlp.frequency.value = 6500;
        var rg = c.createGain(); rg.gain.value = 0.15;
        rsrc.connect(hp); hp.connect(rlp); rlp.connect(rg); rg.connect(out);
        var rlfo = c.createOscillator(); rlfo.frequency.value = 0.2;
        var rlg = c.createGain(); rlg.gain.value = 0.04;
        rlfo.connect(rlg); rlg.connect(rg.gain);
        var rum = c.createOscillator(); rum.type = 'sine'; rum.frequency.value = 90;
        var rumg = c.createGain(); rumg.gain.value = 0.05;
        rum.connect(rumg); rumg.connect(out);
        rsrc.start(now); rlfo.start(now); rum.start(now);
        N.push(rsrc, hp, rlp, rg, rlfo, rlg, rum, rumg);

      } else { // box / по умолчанию — гармонический пад
        var filter = c.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 520; filter.Q.value = 0.6;
        var pg = c.createGain(); pg.gain.value = 0.5;
        [110, 164.81, 220].forEach(function (f) {
          var o1 = c.createOscillator(); o1.type = 'sine'; o1.frequency.value = f;
          var o2 = c.createOscillator(); o2.type = 'triangle'; o2.frequency.value = f * 1.005;
          o1.connect(filter); o2.connect(filter);
          o1.start(now); o2.start(now); N.push(o1, o2);
        });
        filter.connect(pg); pg.connect(out);
        var plfo = c.createOscillator(); plfo.type = 'sine'; plfo.frequency.value = 0.07;
        var plg = c.createGain(); plg.gain.value = 0.18;
        plfo.connect(plg); plg.connect(pg.gain); plfo.start(now);
        N.push(filter, pg, plfo, plg);
      }
      this.sceneId = id;
    },
    resume: function (id) {
      this.ensureCtx();
      if (!this.ctx) return;
      if (this.ctx.state === 'suspended') this.ctx.resume();
      if (this.sceneId !== id) this.buildScene(id);
      if (this.on) this.fadeMaster(0.22, 2.5);
    },
    fadeMaster: function (target, dur) {
      if (!this.ctx) return;
      var g = this.master.gain, now = this.ctx.currentTime;
      g.cancelScheduledValues(now);
      g.setValueAtTime(g.value, now);
      g.linearRampToValueAtTime(target, now + dur);
    },
    pause: function () { this.fadeMaster(0.0, 1.2); },
    setOn: function (v) {
      this.on = v;
      if (!this.ctx) return;
      this.fadeMaster(v ? 0.22 : 0.0, v ? 1.5 : 0.6);
    },
    chime: function (type) {
      if (!this.on || !this.ctx) return;
      var c = this.ctx, now = c.currentTime;
      var base = type === 'in' ? 440 : type === 'out' ? 330 : 392;
      var o = c.createOscillator(); o.type = 'sine'; o.frequency.value = base;
      var o2 = c.createOscillator(); o2.type = 'sine'; o2.frequency.value = base * 2.01;
      var g = c.createGain(); g.gain.value = 0.0;
      o.connect(g); o2.connect(g); g.connect(this.master);
      g.gain.setValueAtTime(0.0, now);
      g.gain.linearRampToValueAtTime(0.16, now + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0008, now + 1.8);
      o.start(now); o2.start(now);
      o.stop(now + 1.9); o2.stop(now + 1.9);
    }
  };

  // ---- Данные техник ----
  // phases: [название, длительность(сек), тип] ; тип: in|hold|out|holdEmpty
  var TECHNIQUES = [
    {
      id: 'box', name: 'Box breathing', pattern: '4-4-4-4', cls: 'tc-box', icon: '▶',
      desc: 'Вдох, задержка, выдох, задержка по 4 сек. Концентрация и снятие стресса.',
      phases: [['Вдох',4,'in'],['Задержка',4,'hold'],['Выдох',4,'out'],['Задержка',4,'holdEmpty']]
    },
    {
      id: '478', name: '4-7-8', pattern: '4-7-8', cls: 'tc-478', icon: '▶',
      desc: 'Вдох 4, задержка 7, выдох 8. Быстро успокаивает, помогает заснуть.',
      phases: [['Вдох',4,'in'],['Задержка',7,'hold'],['Выдох',8,'out']]
    },
    {
      id: 'coherent', name: 'Когерентное', pattern: '5-5', cls: 'tc-coh', icon: '▶',
      desc: 'Ровный вдох 5 и выдох 5. Балансирует нервную систему.',
      phases: [['Вдох',5,'in'],['Выдох',5,'out']]
    },
    {
      id: 'relax', name: 'Расслабляющее', pattern: '4-6', cls: 'tc-relax', icon: '▶',
      desc: 'Вдох 4, удлинённый выдох 6. Быстрое расслабление.',
      phases: [['Вдох',4,'in'],['Выдох',6,'out']]
    }
  ];

  // ---- Цветовые темы под технику (орб + кольца) ----
  var THEMES = {
    box:      { hi:'#b6a2ff', mid:'#8e74e8', deep:'#6b4fd6', glow:'rgba(122,92,240,.6)', ring:'#7a5cf0', sub:'#b9a6f6', track:'rgba(122,92,240,.14)' },
    '478':    { hi:'#8fbcf5', mid:'#3f8ae0', deep:'#1f5fa8', glow:'rgba(31,95,168,.55)',  ring:'#2f7fd6', sub:'#9cc6f2', track:'rgba(31,95,168,.14)' },
    coherent: { hi:'#8fe0b8', mid:'#2fb27a', deep:'#1f8a55', glow:'rgba(31,138,85,.5)',   ring:'#21a06a', sub:'#96ddb7', track:'rgba(31,138,85,.14)' },
    relax:    { hi:'#ffcf9e', mid:'#f0994a', deep:'#c76a1f', glow:'rgba(199,106,31,.5)',  ring:'#e07f2c', sub:'#f3c398', track:'rgba(199,106,31,.16)' }
  };
  function applyTheme(id) {
    var t = THEMES[id] || THEMES.box, s = practice.style;
    s.setProperty('--orb-hi', t.hi);
    s.setProperty('--orb-mid', t.mid);
    s.setProperty('--orb-deep', t.deep);
    s.setProperty('--orb-glow', t.glow);
    s.setProperty('--ring', t.ring);
    s.setProperty('--ring-sub', t.sub);
    s.setProperty('--ring-track', t.track);
  }

  var DURATIONS = [1, 3, 5]; // минуты
  var selectedDuration = 3;

  // ---- Состояние сессии ----
  var current = null, running = false, phaseIdx = 0, secondsLeftInPhase = 0;
  var cycles = 0, elapsed = 0, totalTarget = 0, tickTimer = null;
  var cycleLen = 1;
  var runStart = 0, accumMs = 0, ringRAF = null; // для плавной отрисовки колец

  // ---- DOM ----
  var menu = document.getElementById('menu');
  var practice = document.getElementById('practice');
  var techList = document.getElementById('techList');
  var durRow = document.getElementById('durRow');
  var circle = document.getElementById('circle');
  var phaseName = document.getElementById('phaseName');
  var phaseCount = document.getElementById('phaseCount');
  var ringTime = document.getElementById('ringTime');
  var ringCycle = document.getElementById('ringCycle');
  var pName = document.getElementById('pName');
  var pPattern = document.getElementById('pPattern');
  var toggleBtn = document.getElementById('toggleBtn');
  var stopBtn = document.getElementById('stopBtn');
  var soundBtn = document.getElementById('soundBtn');
  var greetHi = document.getElementById('greetHi');
  var greetName = document.getElementById('greetName');
  var avatar = document.getElementById('avatar');
  var streakNum = document.getElementById('streakNum');
  var streakSub = document.getElementById('streakSub');
  var weekRow = document.getElementById('weekRow');

  // ---- SVG-иконки звука (минималистичные, наследуют цвет) ----
  var ICON_SOUND_ON =
    '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
    'stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' +
    '<path d="M11 5 6 9H3v6h3l5 4z"/>' +
    '<path d="M15.5 8.6a5 5 0 0 1 0 6.8"/>' +
    '<path d="M18.4 6a9 9 0 0 1 0 12"/></svg>';
  var ICON_SOUND_OFF =
    '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
    'stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' +
    '<path d="M11 5 6 9H3v6h3l5 4z"/>' +
    '<path d="M22 9.5 16.5 15"/>' +
    '<path d="M16.5 9.5 22 15"/></svg>';

  // ---- Кольца прогресса (SVG) ----
  function initRing(el) {
    var r = el.r.baseVal.value;
    var C = 2 * Math.PI * r;
    el._C = C;
    el.style.strokeDasharray = C.toFixed(1);
    el.style.strokeDashoffset = C.toFixed(1); // пустое
  }
  function setRing(el, frac) {
    if (frac < 0) frac = 0; if (frac > 1) frac = 1;
    el.style.strokeDashoffset = (el._C * (1 - frac)).toFixed(1);
  }
  initRing(ringTime);
  initRing(ringCycle);

  // Плавная отрисовка колец по кадрам (без секундного лага)
  function elapsedMs() { return accumMs + (running ? (performance.now() - runStart) : 0); }
  function animateRings() {
    var t = elapsedMs() / 1000;              // секунд с начала (дробно)
    if (t > totalTarget) t = totalTarget;
    setRing(ringTime, totalTarget ? t / totalTarget : 0);
    setRing(ringCycle, (t % cycleLen) / cycleLen);
    if (running) ringRAF = requestAnimationFrame(animateRings);
  }
  function startRings() { if (ringRAF) cancelAnimationFrame(ringRAF); ringRAF = requestAnimationFrame(animateRings); }
  function stopRings() { if (ringRAF) { cancelAnimationFrame(ringRAF); ringRAF = null; } }

  // ---- Лог практик (Telegram CloudStorage + localStorage, без бэка) ----
  function pad2(n) { return n < 10 ? '0' + n : '' + n; }
  function fmt(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }

  // URL бота-бэкенда (из bot.py). Пусто — сигнал не шлётся, всё работает локально.
  var BACKEND_URL = '';
  // Сообщаем боту «сегодня занимался», чтобы утром не слать лишнее напоминание.
  function reportDone() {
    if (!BACKEND_URL || !tg || !tg.initData) return;
    try {
      fetch(BACKEND_URL.replace(/\/$/, '') + '/done', {
        method: 'POST',
        body: tg.initData // Telegram-подпись; бот её проверяет
      }).catch(function () {});
    } catch (e) {}
  }

  var Store = {
    KEY: 'breathe_days',
    days: [],
    _merge: function (arr) {
      var seen = {}; var out = [];
      this.days.concat(arr || []).forEach(function (d) { if (d && !seen[d]) { seen[d] = 1; out.push(d); } });
      this.days = out;
    },
    load: function (cb) {
      try { var raw = localStorage.getItem(this.KEY); if (raw) this.days = JSON.parse(raw) || []; } catch (e) {}
      if (cb) cb();
      var self = this;
      try {
        if (tg && tg.CloudStorage && tg.CloudStorage.getItem) {
          tg.CloudStorage.getItem(this.KEY, function (err, val) {
            if (!err && val) {
              try { self._merge(JSON.parse(val) || []); self._persistLocal(); if (cb) cb(); } catch (e) {}
            }
          });
        }
      } catch (e) {}
    },
    _persistLocal: function () { try { localStorage.setItem(this.KEY, JSON.stringify(this.days)); } catch (e) {} },
    addToday: function () {
      var d = fmt(new Date());
      if (this.days.indexOf(d) === -1) {
        this.days.push(d);
        this._persistLocal();
        try { if (tg && tg.CloudStorage && tg.CloudStorage.setItem) tg.CloudStorage.setItem(this.KEY, JSON.stringify(this.days)); } catch (e) {}
      }
    }
  };

  function computeStreak() {
    var set = {}; Store.days.forEach(function (d) { set[d] = 1; });
    var cur = new Date();
    if (!set[fmt(cur)]) { cur.setDate(cur.getDate() - 1); } // сегодня ещё не занимались — считаем от вчера
    var n = 0;
    while (set[fmt(cur)]) { n++; cur.setDate(cur.getDate() - 1); }
    return n;
  }

  function renderStreak() {
    var set = {}; Store.days.forEach(function (d) { set[d] = 1; });
    var streak = computeStreak();
    streakNum.textContent = streak;
    streakSub.textContent = streak > 0 ? (set[fmt(new Date())] ? 'Так держать!' : 'Продолжи серию') : 'Начни сегодня';
    var now = new Date();
    var dow = (now.getDay() + 6) % 7; // 0 = понедельник
    var monday = new Date(now); monday.setDate(now.getDate() - dow);
    var names = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
    var todayS = fmt(now), html = '';
    for (var i = 0; i < 7; i++) {
      var d = new Date(monday); d.setDate(monday.getDate() + i);
      var ds = fmt(d);
      var cls = 'cell' + (set[ds] ? ' done' : '') + (ds === todayS ? ' today' : '');
      html += '<div class="day"><div class="dow">' + names[i] + '</div>' +
              '<div class="' + cls + '">' + d.getDate() + '</div></div>';
    }
    weekRow.innerHTML = html;
  }

  // ---- Приветствие из Telegram (аватар + имя) ----
  function initUser() {
    var u = tg && tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user : null;
    if (!u) return;
    var name = u.first_name || u.username || '';
    if (name) { greetHi.textContent = 'Привет,'; greetName.textContent = name; }
    if (u.photo_url) {
      avatar.textContent = '';
      avatar.style.backgroundImage = 'url("' + u.photo_url + '")';
      avatar.style.backgroundSize = 'cover';
      avatar.style.backgroundPosition = 'center';
    } else if (name) {
      avatar.textContent = name.charAt(0).toUpperCase();
      avatar.style.fontSize = '20px';
      avatar.style.fontWeight = '800';
      avatar.style.color = '#fff';
    }
  }

  // ---- Рендер меню ----
  function renderDurations() {
    var dh = '';
    DURATIONS.forEach(function (m) {
      dh += '<div class="dur-pill' + (m === selectedDuration ? ' selected' : '') + '" data-min="' + m + '">' +
              m + '<span class="u">мин</span></div>';
    });
    durRow.innerHTML = dh;
    Array.prototype.forEach.call(durRow.querySelectorAll('.dur-pill'), function (el) {
      el.addEventListener('click', function () {
        selectedDuration = parseInt(el.getAttribute('data-min'), 10);
        haptic('change');
        renderDurations();
      });
    });
  }

  function renderTechniques() {
    var html = '';
    TECHNIQUES.forEach(function (t, i) {
      html += '<div class="tech-card ' + t.cls + '" data-idx="' + i + '">' +
                '<div class="pill">' + t.pattern + '</div>' +
                '<div class="name">' + t.name + '</div>' +
                '<div class="desc">' + t.desc + '</div>' +
                '<div class="play">' + t.icon + '</div>' +
              '</div>';
    });
    techList.innerHTML = html;
    Array.prototype.forEach.call(techList.querySelectorAll('.tech-card'), function (el) {
      el.addEventListener('click', function () {
        haptic('light');
        startTechnique(parseInt(el.getAttribute('data-idx'), 10));
      });
    });
  }

  // ---- Переход на практику ----
  function startTechnique(idx) {
    current = TECHNIQUES[idx];
    cycleLen = current.phases.reduce(function (a, p) { return a + p[1]; }, 0);
    applyTheme(current.id);
    pName.textContent = current.name;
    pPattern.textContent = current.pattern + '  ·  ' + selectedDuration + ' мин';
    menu.classList.remove('active');
    practice.classList.add('active');
    resetSession();
    if (tg && tg.BackButton) { tg.BackButton.show(); }
  }

  function resetSession() {
    stopLoop(); stopRings();
    running = false; phaseIdx = 0; cycles = 0; elapsed = 0; accumMs = 0;
    totalTarget = selectedDuration * 60;
    setRing(ringTime, 0);
    setRing(ringCycle, 0);
    phaseName.textContent = 'Готов?';
    phaseCount.textContent = '';
    toggleBtn.textContent = 'Старт';
    setCircle(0.6, 0);
  }

  // ---- Анимация круга ----
  function setCircle(scale, durSec) {
    circle.style.transition = durSec > 0 ? ('transform ' + durSec + 's ease-in-out') : 'none';
    circle.style.transform = 'scale(' + scale + ')';
  }
  function applyPhaseVisual(phase) {
    var type = phase[2], dur = phase[1];
    if (type === 'in') setCircle(1.0, dur);
    else if (type === 'out') setCircle(0.55, dur);
    else { circle.style.transition = 'none'; }
  }

  // ---- Основной цикл ----
  function startPhase() {
    var phase = current.phases[phaseIdx];
    phaseName.textContent = phase[0];
    secondsLeftInPhase = phase[1];
    phaseCount.textContent = secondsLeftInPhase;
    applyPhaseVisual(phase);
    haptic('medium');
    Audio.chime(phase[2]);
  }
  function tick() {
    if (!running) return;
    elapsed++;
    if (elapsed >= totalTarget) { finishSession(); return; }
    secondsLeftInPhase--;
    if (secondsLeftInPhase <= 0) {
      phaseIdx++;
      if (phaseIdx >= current.phases.length) { phaseIdx = 0; cycles++; }
      startPhase();
    } else {
      phaseCount.textContent = secondsLeftInPhase;
    }
  }
  function startLoop() { stopLoop(); tickTimer = setInterval(tick, 1000); }
  function stopLoop() { if (tickTimer) { clearInterval(tickTimer); tickTimer = null; } }

  function play() {
    running = true;
    toggleBtn.textContent = 'Пауза';
    runStart = performance.now();
    Audio.resume(current ? current.id : 'box');
    startPhase();
    startLoop();
    startRings();
  }
  function pause() {
    running = false;
    toggleBtn.textContent = 'Продолжить';
    accumMs += performance.now() - runStart;
    stopLoop(); stopRings();
    circle.style.transition = 'none';
    Audio.pause();
  }
  function finishSession() {
    accumMs += performance.now() - runStart;
    stopLoop(); stopRings(); running = false;
    setRing(ringTime, 1); setRing(ringCycle, 1);
    phaseName.textContent = 'Готово';
    phaseCount.textContent = '✓';
    toggleBtn.textContent = 'Ещё раз';
    setCircle(0.78, 1.2);
    haptic('heavy');
    Audio.chime('hold');
    Audio.pause();
    Store.addToday();   // отметили практику за сегодня (локально)
    renderStreak();
    reportDone();       // и сообщили боту — для умного напоминания
    try { if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success'); } catch (e) {}
  }

  // ---- Кнопки ----
  toggleBtn.addEventListener('click', function () {
    haptic('light');
    if (phaseName.textContent === 'Готово') { resetSession(); play(); return; }
    if (running) pause(); else play();
  });

  function goMenu() {
    stopLoop(); stopRings(); running = false;
    practice.classList.remove('active');
    menu.classList.add('active');
    Audio.pause();
    if (tg && tg.BackButton) { tg.BackButton.hide(); }
  }
  stopBtn.addEventListener('click', function () { haptic('light'); goMenu(); });
  if (tg && tg.BackButton) { tg.BackButton.onClick(goMenu); }

  soundBtn.addEventListener('click', function () {
    haptic('change');
    var next = !Audio.on;
    Audio.ensureCtx();
    if (next && Audio.ctx && Audio.ctx.state === 'suspended') Audio.ctx.resume();
    if (next && running) Audio.resume(current ? current.id : 'box');
    Audio.setOn(next);
    soundBtn.innerHTML = next ? ICON_SOUND_ON : ICON_SOUND_OFF;
    soundBtn.classList.toggle('off', !next);
  });

  // ---- init ----
  soundBtn.innerHTML = ICON_SOUND_ON;
  initUser();
  Store.load(renderStreak);
  renderDurations();
  renderTechniques();
})();
</script>
</body>
</html>
